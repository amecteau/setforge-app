name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend tests
        run: npx vitest run

      - name: Rust tests
        run: cd src-tauri && cargo test --lib

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ── Android ────────────────────────────────────────────────────────────────
  build-android:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4.0.1

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks

      - name: Init Android project
        run: npx tauri android init

      - name: Copy Android icons
        run: cp -r src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Inject release signing config
        run: |
          python3 - <<'EOF'
          gradle = 'src-tauri/gen/android/app/build.gradle.kts'
          with open(gradle) as f:
              content = f.read()

          signing_block = '''
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH") ?: "")
                      storePassword = System.getenv("ANDROID_STORE_PASSWORD") ?: ""
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""
                  }
              }
          '''

          content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)
          content = content.replace(
              'getByName("release") {',
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
              1
          )

          with open(gradle, 'w') as f:
              f.write(content)
          print("Signing config injected")
          EOF

      - name: Build debug APK
        run: npx tauri android build --apk --debug

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: npx tauri android build --apk

      - name: Rename APKs
        run: |
          DEBUG=$(find src-tauri/gen/android/app/build/outputs/apk -path "*/debug/*.apk" | head -n 1)
          RELEASE=$(find src-tauri/gen/android/app/build/outputs/apk -path "*/release/*.apk" | head -n 1)
          mv "$DEBUG" "$(dirname "$DEBUG")/setforge-${{ github.ref_name }}-debug.apk"
          mv "$RELEASE" "$(dirname "$RELEASE")/setforge-${{ github.ref_name }}-release.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-apk-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-apk-release
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

  # ── iOS ──────────────────────────────────────────────────────────────────
  build-ios:
    if: false
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install frontend dependencies
        run: npm ci

      - name: Init iOS project
        run: npx tauri ios init

      - name: Copy iOS icons
        run: cp -r src-tauri/icons/ios/. src-tauri/gen/apple/SetForge/Assets.xcassets/AppIcon.appiconset/

      - name: Build iOS (debug, unsigned)
        run: npx tauri ios build --debug -- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Zip app bundle
        run: |
          APP=$(find src-tauri/gen/apple/build -name "*.app" | head -n 1)
          zip -r "$(dirname "$APP")/setforge-${{ github.ref_name }}-ios-debug.zip" "$APP"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-debug
          path: src-tauri/gen/apple/build/**/*.zip

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: artifacts/**/*
          generate_release_notes: true
